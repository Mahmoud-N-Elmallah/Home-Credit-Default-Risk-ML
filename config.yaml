# Project Configuration

globals:
  random_state: 42
  division_epsilon: 1e-9
  n_jobs: -1

data:
  csv:
    infer_schema_length: 10000
    null_values: [ "", "NA", "NaN", "nan", "NULL" ]
    ignore_errors: false
    schema_overrides:
      SK_ID_CURR: "Int64"
      SK_ID_BUREAU: "Int64"
      SK_ID_PREV: "Int64"
      AMT_INCOME_TOTAL: "Float64"
      AMT_CREDIT: "Float64"
      AMT_ANNUITY: "Float64"
      AMT_GOODS_PRICE: "Float64"
      AMT_PAYMENT: "Float64"
      AMT_INSTALMENT: "Float64"
      DAYS_ENTRY_PAYMENT: "Float64"
      DAYS_INSTALMENT: "Float64"
      AMT_BALANCE: "Float64"
      AMT_CREDIT_LIMIT_ACTUAL: "Float64"
      AMT_DRAWINGS_CURRENT: "Float64"
      AMT_APPLICATION: "Float64"
      DAYS_DECISION: "Float64"
      DAYS_EMPLOYED: "Float64"
      DAYS_BIRTH: "Float64"
      DAYS_REGISTRATION: "Float64"
      DAYS_ID_PUBLISH: "Float64"
      DAYS_LAST_PHONE_CHANGE: "Float64"
      MONTHS_BALANCE: "Float64"
      DAYS_CREDIT: "Float64"
      DAYS_CREDIT_ENDDATE: "Float64"
      DAYS_ENDDATE_FACT: "Float64"
      AMT_CREDIT_SUM: "Float64"
      AMT_CREDIT_SUM_DEBT: "Float64"
      AMT_CREDIT_SUM_LIMIT: "Float64"
      AMT_CREDIT_SUM_OVERDUE: "Float64"
      CNT_INSTALMENT: "Float64"
      CNT_INSTALMENT_FUTURE: "Float64"
      CNT_PAYMENT: "Float64"
      AMT_DOWN_PAYMENT: "Float64"
      RATE_DOWN_PAYMENT: "Float64"
      AMT_TOTAL_RECEIVABLE: "Float64"
      AMT_RECEIVABLE_PRINCIPAL: "Float64"
      AMT_RECIVABLE: "Float64"
      CNT_DRAWINGS_CURRENT: "Float64"
      SK_DPD: "Float64"
      SK_DPD_DEF: "Float64"

  raw:
    application_train: "Data/Raw/application_train.csv"
    application_test: "Data/Raw/application_test.csv"
    bureau: "Data/Raw/bureau.csv"
    bureau_balance: "Data/Raw/bureau_balance.csv"
    previous_application: "Data/Raw/previous_application.csv"
    pos_cash_balance: "Data/Raw/POS_CASH_balance.csv"
    installments_payments: "Data/Raw/installments_payments.csv"
    credit_card_balance: "Data/Raw/credit_card_balance.csv"

  final:
    train: "Data/final/final_train.csv"
    test: "Data/final/final_test.csv"
    feature_manifest: "Data/final/feature_manifest.yaml"

pipeline:
  high_null_threshold: 0.6
  correlation_threshold: 0.95
  variance_threshold: 0.995
  warn_on_stale_submission: true
  fill_values:
    aux_missing: 0
    generated_missing: 0
    test_missing_column: 0
  categorical_encoding:
    binary_strategy: "ordinal"
    binary_values: [ 0, 1 ]
    unknown_value: -1
    one_hot_drop_first: true
    null_category_label: "__NULL__"
    frequency_unknown_value: 1
    frequency_normalize: false
  anomaly_fix:
    days_employed_col: "DAYS_EMPLOYED"
    days_employed: 365243
  feature_engineering:
    enabled_sets:
      - "application_extended"
      - "bureau_extended"
      - "previous_interest"
      - "last_n_aggregations"
      - "recency_windows"
      - "pos_cash_cleanup"
      - "missing_indicators"
    day_unit: 365.25
    last_n_records: [ 1, 3, 5, 10 ]
    application_source_cols:
      days_birth: "DAYS_BIRTH"
      amt_goods_price: "AMT_GOODS_PRICE"
      amt_credit: "AMT_CREDIT"
    document_flag_prefix: "FLAG_DOCUMENT_"
    output_features:
      document_count: "DOCUMENT_COUNT"
      ext_sources_mean: "EXT_SOURCES_MEAN"
      ext_sources_prod: "EXT_SOURCES_PROD"
      ext_sources_std: "EXT_SOURCES_STD"
      ext_sources_min: "EXT_SOURCES_MIN"
      ext_sources_max: "EXT_SOURCES_MAX"
      ext_sources_range: "EXT_SOURCES_RANGE"
      enquiry_total: "AMT_REQ_CREDIT_BUREAU_TOTAL"
      age_years: "AGE_YEARS"
      down_payment: "DOWN_PAYMENT"
      down_payment_ratio: "DOWN_PAYMENT_RATIO"
    base_ratio_features:
      - name: "DAYS_EMPLOYED_PERC"
        numerator: "DAYS_EMPLOYED"
        denominator: "DAYS_BIRTH"
      - name: "INCOME_PER_PERSON"
        numerator: "AMT_INCOME_TOTAL"
        denominator: "CNT_FAM_MEMBERS"
    global_ratio_features:
      - name: "CREDIT_INCOME_RATIO"
        numerator: "AMT_CREDIT"
        denominator: "AMT_INCOME_TOTAL"
      - name: "ANNUITY_INCOME_RATIO"
        numerator: "AMT_ANNUITY"
        denominator: "AMT_INCOME_TOTAL"
      - name: "CREDIT_TERM"
        numerator: "AMT_ANNUITY"
        denominator: "AMT_CREDIT"
      - name: "GOODS_CREDIT_RATIO"
        numerator: "AMT_GOODS_PRICE"
        denominator: "AMT_CREDIT"
    extended_ratio_features:
      - name: "CREDIT_TO_ANNUITY_RATIO"
        numerator: "AMT_CREDIT"
        denominator: "AMT_ANNUITY"
      - name: "CREDIT_TO_GOODS_RATIO"
        numerator: "AMT_CREDIT"
        denominator: "AMT_GOODS_PRICE"
      - name: "REGISTRATION_BIRTH_RATIO"
        numerator: "DAYS_REGISTRATION"
        denominator: "DAYS_BIRTH"
      - name: "ID_PUBLISH_BIRTH_RATIO"
        numerator: "DAYS_ID_PUBLISH"
        denominator: "DAYS_BIRTH"
      - name: "PHONE_CHANGE_BIRTH_RATIO"
        numerator: "DAYS_LAST_PHONE_CHANGE"
        denominator: "DAYS_BIRTH"
    recency_months: [ 3, 6, 12, 24 ]
    recency_days: [ 60, 90, 180, 365, 730, 1000 ]
    bureau_recency_days: [ 365, 730, 1095 ]
    ext_source_interaction_bases:
      - "CREDIT_INCOME_RATIO"
      - "ANNUITY_INCOME_RATIO"
    missing_indicator_cols:
      - "EXT_SOURCE_1"
      - "EXT_SOURCE_2"
      - "EXT_SOURCE_3"
      - "AMT_ANNUITY"
      - "AMT_GOODS_PRICE"
      - "DAYS_LAST_PHONE_CHANGE"
    frequency_encoding_cols:
      - "ORGANIZATION_TYPE"
      - "OCCUPATION_TYPE"
    ext_sources: [ "EXT_SOURCE_1", "EXT_SOURCE_2", "EXT_SOURCE_3" ]
    enquiry_cols:
      - "AMT_REQ_CREDIT_BUREAU_HOUR"
      - "AMT_REQ_CREDIT_BUREAU_DAY"
      - "AMT_REQ_CREDIT_BUREAU_WEEK"
      - "AMT_REQ_CREDIT_BUREAU_MON"
      - "AMT_REQ_CREDIT_BUREAU_QRT"
      - "AMT_REQ_CREDIT_BUREAU_YEAR"

  aggregations:
    bureau_balance:
      id_col: "SK_ID_BUREAU"
      status_col: "STATUS"
      month_col: "MONTHS_BALANCE"
    bureau:
      prefix: "bureau_"
      id_col: "SK_ID_BUREAU"
      days_credit_col: "DAYS_CREDIT"
      amt_credit_sum_col: "AMT_CREDIT_SUM"
      amt_credit_sum_debt_col: "AMT_CREDIT_SUM_DEBT"
      amt_credit_sum_limit_col: "AMT_CREDIT_SUM_LIMIT"
      amt_credit_sum_overdue_col: "AMT_CREDIT_SUM_OVERDUE"
      days_credit_enddate_col: "DAYS_CREDIT_ENDDATE"
      days_enddate_fact_col: "DAYS_ENDDATE_FACT"
      debt_credit_ratio_col: "DEBT_CREDIT_RATIO"
      credit_active_col: "CREDIT_ACTIVE"
      status_splits:
        active: "Active"
        closed: "Closed"
    previous_application:
      prefix: "prev_"
      id_col: "SK_ID_PREV"
      amt_application_col: "AMT_APPLICATION"
      amt_credit_col: "AMT_CREDIT"
      app_credit_gap_col: "APP_CREDIT_GAP"
      status_col: "NAME_CONTRACT_STATUS"
      days_decision_col: "DAYS_DECISION"
      amt_annuity_col: "AMT_ANNUITY"
      cnt_payment_col: "CNT_PAYMENT"
      amt_down_payment_col: "AMT_DOWN_PAYMENT"
      rate_down_payment_col: "RATE_DOWN_PAYMENT"
      total_payment_col: "PREV_TOTAL_PAYMENT"
      simple_interest_col: "PREV_SIMPLE_INTEREST"
      credit_to_annuity_col: "PREV_CREDIT_TO_ANNUITY"
      status_values:
        approved: "Approved"
        refused: "Refused"
        canceled: "Canceled"
    pos_cash:
      prefix: "pos_"
      id_col: "SK_ID_PREV"
      month_col: "MONTHS_BALANCE"
      dpd_col: "SK_DPD"
      cnt_instalment_col: "CNT_INSTALMENT"
      cnt_instalment_future_col: "CNT_INSTALMENT_FUTURE"
      cleanup:
        enabled: true
        min_values:
          SK_DPD: 0
          CNT_INSTALMENT: 0
          CNT_INSTALMENT_FUTURE: 0
    installments:
      prefix: "inst_"
      instalment_version_col: "NUM_INSTALMENT_VERSION"
      amt_payment_col: "AMT_PAYMENT"
      amt_instalment_col: "AMT_INSTALMENT"
      days_entry_payment_col: "DAYS_ENTRY_PAYMENT"
      days_instalment_col: "DAYS_INSTALMENT"
      payment_perc_col: "PAYMENT_PERC"
      payment_diff_col: "PAYMENT_DIFF"
      dpd_col: "DPD"
      dbd_col: "DBD"
    credit_card_balance:
      prefix: "cc_"
      month_col: "MONTHS_BALANCE"
      amt_balance_col: "AMT_BALANCE"
      credit_limit_col: "AMT_CREDIT_LIMIT_ACTUAL"
      drawings_col: "AMT_DRAWINGS_CURRENT"
      dpd_col: "SK_DPD"
      utilization_col: "UTILIZATION"
      total_receivable_col: "AMT_TOTAL_RECEIVABLE"
      receivable_principal_col: "AMT_RECEIVABLE_PRINCIPAL"
      drawings_count_col: "CNT_DRAWINGS_CURRENT"
training:
  target_col: "TARGET"
  id_col: "SK_ID_CURR"
  run_mode: "max_quality"
  run_profiles:
    fast_dev:
      cv_splits: 2
      optuna_n_trials: 5
      optuna_subsample_rate: 0.15
      run_full_oof_validation: false
      feature_selection_enabled_during_search: false
    balanced:
      cv_splits: 3
      optuna_n_trials: 10
      optuna_subsample_rate: 0.35
      run_full_oof_validation: true
      feature_selection_enabled_during_search: false
    balanced_deep:
      cv_splits: 3
      optuna_n_trials: 30
      optuna_subsample_rate: 0.5
      run_full_oof_validation: true
      feature_selection_enabled_during_search: false
    max_quality:
      cv_splits: 5
      optuna_n_trials: 50
      optuna_subsample_rate: 1.0
      run_full_oof_validation: true
      feature_selection_enabled_during_search: true
  phases:
    search: true
    validate: true
    final_fit: true
  artifact_reuse:
    allow_stale_artifacts: false
    metadata: "training_run_metadata.yaml"
  experiment:
    name:
    folder_template: "{timestamp}_{run_mode}_{primary_model}"
  threshold_tuning:
    enabled: true
    objective: "f1"
    grid:
      min: 0.01
      max: 0.99
      step: 0.01
  reports:
    save_oof_predictions: true
    save_threshold_table: true
    save_lift_table: true
    save_curves: true
    save_feature_importance: true
    feature_importance_top_n: 50
  model_comparison:
    enabled: false
    candidates: [ "catboost", "lightgbm" ]
    max_trials_per_model: 5
    cv_splits: 3
    subsample_rate: 0.35
  calibration:
    enabled: true
    method: "isotonic"
    cv_splits: 3
    apply_to_submission: false
  acceleration:
    preferred: "gpu"
    fallback: "cpu"
    retry_on_failure: true
    retry_failure_keywords:
      - "gpu"
      - "cuda"
      - "opencl"
      - "driver"
      - "device"
      - "not compiled"
      - "not supported"
      - "no kernel image"
      - "cuda error"
      - "catboost/libs/train_lib"
    models:
      catboost:
        gpu_params:
          task_type: "GPU"
        cpu_params:
          task_type: "CPU"
          thread_count: -1
      lightgbm:
        gpu_params:
          device_type: "gpu"
        cpu_params:
          device_type: "cpu"
          n_jobs: -1
      xgboost:
        gpu_params:
          tree_method: "hist"
          device: "cuda"
        cpu_params:
          tree_method: "hist"
          device: "cpu"
          n_jobs: -1
  optimization_metric: "roc_auc"
  cv_shuffle: true
  classification_threshold: 0.5
  optuna_direction: "maximize"

  verbosity:
    catboost_trial: 0
    catboost_final: 50
    lgbm: -1
    optuna: "INFO"

  artifact_paths:
    models_dir: "Models"
    latest_experiment: "latest_experiment.txt"
    config_snapshot: "config_snapshot.yaml"
    submission: "submission.csv"
    preprocessor: "training_preprocessor.pkl"
    threshold: "threshold.yaml"
    best_params: "best_params.yaml"
    single_model: "final_model.pkl"
    evaluation_report: "reports/evaluation_report.txt"
    metrics: "reports/metrics.yaml"
    oof_predictions: "reports/oof_predictions.csv"
    threshold_table: "reports/threshold_table.csv"
    lift_table: "reports/lift_deciles.csv"
    model_comparison_csv: "reports/model_comparison.csv"
    model_comparison_yaml: "reports/model_comparison.yaml"
    feature_importance: "reports/feature_importance.csv"
    feature_importance_plot: "plots/feature_importance_top.png"
    calibration_diagnostics: "reports/calibration_diagnostics.yaml"
    confusion_matrix: "plots/confusion_matrix.png"
    roc_curve: "plots/roc_curve.png"
    pr_curve: "plots/pr_curve.png"
    calibration_curve: "plots/calibration_curve.png"
    lift_chart: "plots/lift_chart.png"

  evaluation:
    report_digits: 4
    confusion_matrix_figsize: [ 6, 5 ]
    confusion_matrix_cmap: "Blues"

  preprocessing:
    scaler: "robust"
    imbalance:
      strategy: "class_weight"
      sampler_params: { }
      class_weight_params:
        catboost:
          auto_class_weights: "Balanced"
        lightgbm:
          is_unbalance: true
        xgboost:
          scale_pos_weight: 11.3
    feature_selection:
      method: "lgbm"
      max_features: 150
      threshold: "-inf"
      enabled_during_search: false
      selector_params:
        n_estimators: 200
        verbose: -1
    feature_pruning:
      enabled: false
      source: "feature_importance"
      min_importance: 0.0
      keep_top_n:
      always_keep: []

  models:
    primary: "catboost"
    candidates:
      - name: "catboost"
        params:
          iterations: 1000
          learning_rate: 0.05
          depth: 6
          early_stopping_rounds: 50
          eval_fraction: 0.1
          allow_writing_files: false
          bootstrap_type: "Bernoulli"
          rsm: 0.8
        search_space:
          model__iterations: { type: "int", low: 500, high: 2000 }
          model__learning_rate: { type: "float", low: 0.01, high: 0.1, log: true }
          model__depth: { type: "int", low: 4, high: 10 }
          model__l2_leaf_reg: { type: "float", low: 1, high: 10 }

      - name: "lightgbm"
        params:
          n_estimators: 1000
          learning_rate: 0.05
          max_depth: 6
          early_stopping_rounds: 50
          eval_fraction: 0.1
          force_col_wise: true
          num_threads: -1
        search_space:
          model__num_leaves: { type: "int", low: 20, high: 128 }
          model__max_depth: { type: "int", low: 4, high: 12 }
          model__learning_rate: { type: "float", low: 0.01, high: 0.1, log: true }
          model__n_estimators: { type: "int", low: 500, high: 2000 }

      - name: "xgboost"
        params:
          n_estimators: 1000
          learning_rate: 0.05
          max_depth: 6
          early_stopping_rounds: 50
          eval_fraction: 0.1
          n_jobs: -1
        search_space:
          model__n_estimators: { type: "int", low: 500, high: 2000 }
          model__learning_rate: { type: "float", low: 0.01, high: 0.1, log: true }
          model__max_depth: { type: "int", low: 4, high: 10 }
          model__gamma: { type: "float", low: 0, high: 10 }
          model__reg_alpha: { type: "float", low: 0, high: 10 }
