    - path: Data/Raw/previous_application.csv
      hash: md5
      md5: bd1eb5f08a4700414db1742e5cc0f9fa
      size: 404973293
    - path: main.py
      hash: md5
      md5: b90840494f9673b9b8bc17e9029e0b39
