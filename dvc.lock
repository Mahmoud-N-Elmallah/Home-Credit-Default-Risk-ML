    - path: src/common
      hash: md5
      md5: b5d68cfda09949c8d5da752488397987.dir
      size: 6581
      nfiles: 7
    - path: src/data_processing
      hash: md5
      md5: 89bddddf7c755a0fbe2a6421baeb6a3f.dir
      size: 63575
      nfiles: 8
    params:
      conf/config.yaml:
        data.csv:
          infer_schema_length: 10000
          null_values:
          - ''
          - NA
          - NaN
          - nan
          - 'NULL'
          ignore_errors: false
        data.final:
          train: Data/final/final_train.csv
          test: Data/final/final_test.csv
          feature_manifest: Data/final/feature_manifest.yaml
          validation_report: Data/final/validation_report.yaml
        data.raw:
          application_train: Data/Raw/application_train.csv
          application_test: Data/Raw/application_test.csv
          bureau: Data/Raw/bureau.csv
          bureau_balance: Data/Raw/bureau_balance.csv
          previous_application: Data/Raw/previous_application.csv
          pos_cash_balance: Data/Raw/POS_CASH_balance.csv
          installments_payments: Data/Raw/installments_payments.csv
          credit_card_balance: Data/Raw/credit_card_balance.csv
        globals:
          random_state: 42
          division_epsilon: 1e-09
        pipeline:
          high_null_threshold: 0.6
          correlation_threshold: 0.99
          variance_threshold: 0.995
          warn_on_stale_submission: true
          fill_values:
            aux_missing: 0
            generated_missing: 0
            test_missing_column: 0
          categorical_encoding:
            binary_strategy: ordinal
            binary_values:
            - 0
            - 1
            unknown_value: -1
            one_hot_drop_first: false
            null_category_label: __NULL__
            frequency_unknown_value: 1
            frequency_normalize: false
          anomaly_fix:
            days_employed: 365243
          feature_engineering:
            enabled_sets:
            - application_extended
            - bureau_extended
            - previous_interest
            - last_n_aggregations
            - recency_windows
            - pos_cash_cleanup
            - missing_indicators
        training.id_col: SK_ID_CURR
        training.target_col: TARGET
    outs:
    - path: Data/final
      hash: md5
      md5: 841a6c5599b0cba3fd3b77a839c98f67.dir
      size: 1029786270
      nfiles: 4
  train:
    cmd: uv run python main.py run.step=train training.experiment.name=dvc_train
      training.experiment.overwrite_existing=true tracking.mlflow.enabled=true
    deps:
    - path: Data/final
      hash: md5
      md5: 841a6c5599b0cba3fd3b77a839c98f67.dir
      size: 1029786270
      nfiles: 4
    - path: main.py
      hash: md5
      md5: b90840494f9673b9b8bc17e9029e0b39
      size: 1734
    - path: src/common
      hash: md5
      md5: b5d68cfda09949c8d5da752488397987.dir
      size: 6581
      nfiles: 7
    - path: src/model_training
      hash: md5
      md5: e5d60fdf6baf690610ada720117702a4.dir
      size: 52622
      nfiles: 9
    params:
      conf/config.yaml:
        data.final:
          train: Data/final/final_train.csv
          test: Data/final/final_test.csv
          feature_manifest: Data/final/feature_manifest.yaml
          validation_report: Data/final/validation_report.yaml
        globals:
          random_state: 42
          division_epsilon: 1e-09
        tracking:
          mlflow:
            enabled: true
            tracking_uri: 
              ${oc.env:MLFLOW_TRACKING_URI,https://dagshub.com/mahmoudelmalah85/Home-Credit-Default-Risk-ML.mlflow}
            experiment_name: home-credit-default-risk-ml
            log_artifacts: true
            log_model_artifacts: true
            registry:
              enabled: true
              registered_model_name: home-credit-default-risk
              alias: champion
              min_roc_auc: 0.785
              required: false
        training:
          target_col: TARGET
          id_col: SK_ID_CURR
          cv_splits: 5
          optuna_n_trials: 5
          optuna_subsample_rate: 0.15
          run_full_oof_validation: true
          accelerator: gpu
          phases:
            search: true
            validate: true
            final_fit: true
          artifact_reuse:
            allow_stale_artifacts: false
          experiment:
            name:
            folder_template: '{timestamp}_{primary_model}'
            overwrite_existing: false
          threshold_tuning:
            enabled: true
            objective: f1
            grid:
              min: 0.01
              max: 0.99
              step: 0.01
          optimization_metric: roc_auc
          cv_shuffle: true
          classification_threshold: 0.5
          optuna_direction: maximize
          artifact_paths:
            models_dir: Models
          preprocessing:
            scaler: robust
            imbalance:
              strategy: class_weight
              sampler_params: {}
            feature_selection:
              method: lgbm
              max_features: 150
              threshold: -inf
              enabled_during_search: false
              selector_params:
                n_estimators: 200
                verbose: -1
            feature_pruning:
              enabled: false
              source: feature_importance
              min_importance: 0.0
              keep_top_n:
              always_keep: []
          models:
            primary: catboost
            candidates:
            - name: catboost
              params:
                iterations: 1000
                learning_rate: 0.05
                depth: 6
                early_stopping_rounds: 50
                eval_fraction: 0.1
                allow_writing_files: false
                bootstrap_type: Bernoulli
                rsm: 0.8
              search_space:
                model__iterations:
                  type: int
                  low: 500
                  high: 2000
                model__learning_rate:
                  type: float
                  low: 0.01
                  high: 0.1
                  log: true
                model__depth:
                  type: int
                  low: 4
                  high: 10
                model__l2_leaf_reg:
                  type: float
                  low: 0.5
                  high: 20
            - name: lightgbm
              params:
                n_estimators: 1000
                learning_rate: 0.05
                max_depth: 6
                early_stopping_rounds: 50
                eval_fraction: 0.1
                force_col_wise: true
                num_threads: -1
              search_space:
                model__num_leaves:
                  type: int
                  low: 20
                  high: 128
                model__max_depth:
                  type: int
                  low: 4
                  high: 12
                model__learning_rate:
                  type: float
                  low: 0.01
                  high: 0.1
                  log: true
                model__n_estimators:
                  type: int
                  low: 500
                  high: 2000
            - name: xgboost
              params:
                n_estimators: 1000
                learning_rate: 0.05
                max_depth: 6
                early_stopping_rounds: 50
                eval_fraction: 0.1
                n_jobs: -1
              search_space:
                model__n_estimators:
                  type: int
                  low: 500
                  high: 2000
                model__learning_rate:
                  type: float
                  low: 0.01
                  high: 0.1
                  log: true
                model__max_depth:
                  type: int
                  low: 4
                  high: 10
                model__gamma:
                  type: float
                  low: 0
                  high: 10
                model__reg_alpha:
                  type: float
                  low: 0
                  high: 10
    outs:
