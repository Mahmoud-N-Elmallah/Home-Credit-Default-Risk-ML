# Project Configuration

defaults:
  - override hydra/job_logging: disabled
  - _self_

run:
  step: "all"

hydra:
  job:
    chdir: false
  run:
    dir: "Models/hydra_runs/${now:%Y%m%d_%H%M%S}"

globals:
  random_state: 42
  division_epsilon: 1e-9

data:
  csv:
    infer_schema_length: 10000
    null_values: [ "", "NA", "NaN", "nan", "NULL" ]
    ignore_errors: false

  raw:
    application_train: "Data/Raw/application_train.csv"
    application_test: "Data/Raw/application_test.csv"
    bureau: "Data/Raw/bureau.csv"
    bureau_balance: "Data/Raw/bureau_balance.csv"
    previous_application: "Data/Raw/previous_application.csv"
    pos_cash_balance: "Data/Raw/POS_CASH_balance.csv"
    installments_payments: "Data/Raw/installments_payments.csv"
    credit_card_balance: "Data/Raw/credit_card_balance.csv"

  final:
    train: "Data/final/final_train.csv"
    test: "Data/final/final_test.csv"
    feature_manifest: "Data/final/feature_manifest.yaml"

pipeline:
  high_null_threshold: 0.6
  correlation_threshold: 0.99
  variance_threshold: 0.995
  warn_on_stale_submission: true
  fill_values:
    aux_missing: 0
    generated_missing: 0
    test_missing_column: 0
  categorical_encoding:
    binary_strategy: "ordinal"
    binary_values: [ 0, 1 ]
    unknown_value: -1
    one_hot_drop_first: false
    null_category_label: "__NULL__"
    frequency_unknown_value: 1
    frequency_normalize: false
  anomaly_fix:
    days_employed: 365243
  feature_engineering:
    enabled_sets:
      - "application_extended"
      - "bureau_extended"
      - "previous_interest"
      - "last_n_aggregations"
      - "recency_windows"
      - "pos_cash_cleanup"
      - "missing_indicators"

artifacts:
  best_experiment_dir: "Models/20260420_174015_balanced_catboost"

tracking:
  mlflow:
    enabled: true
    tracking_uri: "https://dagshub.com/mahmoudelmalah85/Home-Credit-Default-Risk-ML.mlflow"
    experiment_name: "home-credit-default-risk-ml"
    log_artifacts: true
    log_model_artifacts: true

analysis:
  shap:
    sample_size: 5000
    top_n: 30
    metadata_preview_limit: 20
    console_preview_limit: 10
    reports:
      feature_importance: "reports/shap_feature_importance.csv"
      metadata: "reports/shap_metadata.yaml"
    plots:
      summary_bar: "plots/shap_summary_bar.png"
      beeswarm: "plots/shap_beeswarm_top.png"
    plot:
      dpi: 160
      bar_fig_width: 10
      bar_fig_min_height: 6
      bar_height_per_feature: 0.28
      bar_color: "#4c78a8"
      beeswarm_fig_width: 11
      beeswarm_fig_min_height: 7
      beeswarm_height_per_feature: 0.3
      beeswarm_jitter: 0.28
      beeswarm_marker_size: 8
      beeswarm_alpha: 0.55
      beeswarm_cmap: "coolwarm"
      beeswarm_value_percentiles: [ 1, 99 ]
      zero_line_color: "#333333"
      zero_line_width: 1

inference:
  input_path:
  output_path: "inference/predictions.csv"
  probability_col: "TARGET_PROBABILITY"
  label_col: "TARGET_PREDICTION"
  include_binary_label: true
  threshold_source: "artifact"
  default_threshold: 0.5
  allow_target_column: false
  missing_feature_strategy: "fill"
  missing_feature_fill_value: 0
  max_missing_features_to_fill: 20

training:
  target_col: "TARGET"
  id_col: "SK_ID_CURR"
  cv_splits: 3
  optuna_n_trials: 10
  optuna_subsample_rate: 0.35
  run_full_oof_validation: true
  phases:
    search: true
    validate: true
    final_fit: true
  artifact_reuse:
    allow_stale_artifacts: false
    metadata: "training_run_metadata.yaml"
  experiment:
    name:
    folder_template: "{timestamp}_{primary_model}"
  threshold_tuning:
    enabled: true
    objective: "f1"
    grid:
      min: 0.01
      max: 0.99
      step: 0.01
  reports:
    save_threshold_table: true
    save_curves: true
    save_feature_importance: true
    feature_importance_top_n: 50
  acceleration:
    preferred: "gpu"
    fallback: "cpu"
    retry_on_failure: true
    retry_failure_keywords:
      - "gpu"
      - "cuda"
      - "opencl"
      - "driver"
      - "device"
      - "not compiled"
      - "not supported"
      - "no kernel image"
      - "cuda error"
      - "catboost/libs/train_lib"
    models:
      catboost:
        gpu_params:
          task_type: "GPU"
        cpu_params:
          task_type: "CPU"
          thread_count: -1
      lightgbm:
        gpu_params:
          device_type: "gpu"
        cpu_params:
          device_type: "cpu"
          n_jobs: -1
      xgboost:
        gpu_params:
          tree_method: "hist"
          device: "cuda"
        cpu_params:
          tree_method: "hist"
          device: "cpu"
          n_jobs: -1
  optimization_metric: "roc_auc"
  cv_shuffle: true
  classification_threshold: 0.5
  optuna_direction: "maximize"

  verbosity:
    catboost_trial: 0
    catboost_final: 50
    lgbm: -1
    optuna: "INFO"

  artifact_paths:
    models_dir: "Models"
    latest_experiment: "latest_experiment.txt"
    config_snapshot: "config_snapshot.yaml"
    submission: "submission.csv"
    preprocessor: "training_preprocessor.pkl"
    threshold: "threshold.yaml"
    best_params: "best_params.yaml"
    single_model: "final_model.pkl"
    evaluation_report: "reports/evaluation_report.txt"
    metrics: "reports/metrics.yaml"
    threshold_table: "reports/threshold_table.csv"
    feature_importance: "reports/feature_importance.csv"
    feature_importance_plot: "plots/feature_importance_top.png"
    confusion_matrix: "plots/confusion_matrix.png"
    roc_curve: "plots/roc_curve.png"

  evaluation:
    report_digits: 4
    confusion_matrix_figsize: [ 6, 5 ]
    confusion_matrix_cmap: "Blues"
    roc_curve_figsize: [ 6, 5 ]
    feature_importance_fig_width: 8
    feature_importance_min_height: 4
    feature_importance_max_height: 12
    feature_importance_height_per_feature: 0.22

  preprocessing:
    scaler: "robust"
    imbalance:
      strategy: "class_weight"
      sampler_params: { }
      class_weight_params:
        catboost:
          auto_class_weights: "Balanced"
        lightgbm:
          is_unbalance: true
        xgboost:
          scale_pos_weight: 11.3
    feature_selection:
      method: "lgbm"
      max_features: 150
      threshold: "-inf"
      enabled_during_search: false
      selector_params:
        n_estimators: 200
        verbose: -1
    feature_pruning:
      enabled: false
      source: "feature_importance"
      min_importance: 0.0
      keep_top_n:
      always_keep: []

  models:
    primary: "catboost"
    candidates:
      - name: "catboost"
        params:
          iterations: 1000
          learning_rate: 0.05
          depth: 6
          early_stopping_rounds: 50
          eval_fraction: 0.1
          allow_writing_files: false
          bootstrap_type: "Bernoulli"
          rsm: 0.8
        search_space:
          model__iterations: { type: "int", low: 500, high: 2000 }
          model__learning_rate: { type: "float", low: 0.01, high: 0.1, log: true }
          model__depth: { type: "int", low: 4, high: 10 }
          model__l2_leaf_reg: { type: "float", low: 1, high: 10 }

      - name: "lightgbm"
        params:
          n_estimators: 1000
          learning_rate: 0.05
          max_depth: 6
          early_stopping_rounds: 50
          eval_fraction: 0.1
          force_col_wise: true
          num_threads: -1
        search_space:
          model__num_leaves: { type: "int", low: 20, high: 128 }
          model__max_depth: { type: "int", low: 4, high: 12 }
          model__learning_rate: { type: "float", low: 0.01, high: 0.1, log: true }
          model__n_estimators: { type: "int", low: 500, high: 2000 }

      - name: "xgboost"
        params:
          n_estimators: 1000
          learning_rate: 0.05
          max_depth: 6
          early_stopping_rounds: 50
          eval_fraction: 0.1
          n_jobs: -1
        search_space:
          model__n_estimators: { type: "int", low: 500, high: 2000 }
          model__learning_rate: { type: "float", low: 0.01, high: 0.1, log: true }
          model__max_depth: { type: "int", low: 4, high: 10 }
          model__gamma: { type: "float", low: 0, high: 10 }
          model__reg_alpha: { type: "float", low: 0, high: 10 }
